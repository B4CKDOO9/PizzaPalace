<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizza Place</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f3e9;
        }

        header {
            background: #d62828;
            color: #fff;
            padding: 20px;
            text-align: center;
            font-size: 2rem;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
        }

        .order-section {
            margin-top: 40px;
            text-align: center;
        }

        .order-btn {
            background: #f77f00;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 6px;
            color: white;
        }

        .order-btn:hover {
            background: #ff9500;
        }
    </style>
</head>

<body>
    <header>Pizza Palace</header>

    <section class="hero">
        <h1>Fresh. Hot. Delicious.</h1>
        <p>Order your favorite pizza in seconds.</p>
    </section>

    <section class="order-section">
        <button class="order-btn">Order Now</button>
    </section>
</body>

</html>
